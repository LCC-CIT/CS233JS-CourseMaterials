<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 3 pixel border around the whole 100x100 image area, transparent background -->
  <rect x="1.5" y="1.5" width="97" height="97" fill="none" stroke="black" stroke-width="3" rx="10" />
  
  <!-- Downward-pointing red spade path, extending to exactly 2px from the edges (96x96 bounds) -->
  <path d="M 60 2 
           C 55 15, 52 25, 50 35 
           C 50 15, 98 15, 98 45 
           C 98 65, 60 70, 50 98 
           C 40 70, 2 65, 2 45 
           C 2 15, 50 15, 50 35 
           C 48 25, 45 15, 40 2 
           Z" 
        fill="red" />
</svg>
