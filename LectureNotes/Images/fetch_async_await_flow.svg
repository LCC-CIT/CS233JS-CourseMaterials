<svg viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#333"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#2e7d32"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#222">fetch() with async / await — Execution Flow &amp; Timing</text>
  <text x="500" y="68" text-anchor="middle" font-size="14" fill="#555">await pauses the async function but does NOT block the main thread. Code reads top-to-bottom like synchronous code.</text>

  <!-- ====== PHASE 1: initial sync run ====== -->
  <rect x="20" y="90" width="960" height="280" fill="#e8f4fd" rx="10" stroke="#90caf9" stroke-width="1"/>
  <text x="40" y="118" font-size="16" font-weight="bold" fill="#0d47a1">PHASE 1 — Synchronous start (runs immediately when fetchQuote() is called)</text>

  <!-- Step 1 -->
  <circle cx="55" cy="160" r="14" fill="#1565c0"/>
  <text x="55" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <rect x="80" y="140" width="450" height="40" fill="white" stroke="#1565c0" stroke-width="1.5" rx="6"/>
  <text x="95" y="165" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">fetchQuote();   // at bottom of file</text>

  <line x1="535" y1="160" x2="568" y2="160" stroke="#1565c0" stroke-width="1.5"/>
  <text x="575" y="155" font-size="12" fill="#0d47a1" font-weight="bold">async function is invoked</text>
  <text x="575" y="171" font-size="12" fill="#333">An async function always returns a Promise.</text>

  <line x1="305" y1="180" x2="305" y2="215" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <circle cx="55" cy="250" r="14" fill="#1565c0"/>
  <text x="55" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="white">2</text>
  <rect x="80" y="220" width="450" height="65" fill="white" stroke="#1565c0" stroke-width="1.5" rx="6"/>
  <text x="95" y="241" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">try {</text>
  <text x="115" y="259" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">  const response = await fetch('...');</text>
  <text x="95" y="277" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">  // ↑ fetch() returns a Promise</text>

  <line x1="535" y1="252" x2="568" y2="252" stroke="#1565c0" stroke-width="1.5"/>
  <text x="575" y="237" font-size="12" fill="#0d47a1" font-weight="bold">fetch() dispatches the request</text>
  <text x="575" y="253" font-size="12" fill="#333">Returns a pending Promise. The function</text>
  <text x="575" y="269" font-size="12" fill="#333">does not yet have a Response — it has a</text>
  <text x="575" y="285" font-size="12" fill="#333">promise of one.</text>

  <line x1="305" y1="285" x2="305" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Pause banner 1 -->
  <rect x="100" y="325" width="800" height="35" fill="#ffeb3b" stroke="#f9a825" stroke-width="2" rx="6"/>
  <text x="500" y="349" text-anchor="middle" font-size="14" font-weight="bold" fill="#5d4037">⏸  await PAUSES fetchQuote here. Control returns to the caller. The main thread is FREE.</text>

  <!-- ====== Between awaits: main thread free ====== -->
  <rect x="20" y="385" width="960" height="60" fill="#f3e5f5" rx="10" stroke="#ce93d8" stroke-width="1"/>
  <text x="500" y="410" text-anchor="middle" font-size="13" fill="#4a148c" font-weight="bold">Main thread is idle (from fetchQuote's perspective)</text>
  <text x="500" y="430" text-anchor="middle" font-size="12" fill="#6a1b9a" font-style="italic">Browser renders, handles clicks, runs other scripts. Network request travels to the server and back.</text>

  <!-- ====== PHASE 2: resume after first await ====== -->
  <rect x="20" y="460" width="960" height="280" fill="#fff3e0" rx="10" stroke="#ffb74d" stroke-width="1"/>
  <text x="40" y="488" font-size="16" font-weight="bold" fill="#e65100">PHASE 2 — Resume after first await (when fetch's Promise resolves)</text>

  <!-- Step 3 -->
  <circle cx="55" cy="530" r="14" fill="#2e7d32"/>
  <text x="55" y="535" text-anchor="middle" font-size="14" font-weight="bold" fill="white">3</text>
  <rect x="80" y="510" width="450" height="40" fill="white" stroke="#2e7d32" stroke-width="1.5" rx="6"/>
  <text x="95" y="535" font-size="13" fill="#222" font-weight="bold">Response arrives → fetchQuote RESUMES</text>

  <line x1="535" y1="530" x2="568" y2="530" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="575" y="525" font-size="12" fill="#2e7d32" font-weight="bold">response is assigned</text>
  <text x="575" y="541" font-size="12" fill="#333">The value waited on (a Response object) is</text>
  <text x="575" y="557" font-size="12" fill="#333">stored in the response variable.</text>

  <line x1="305" y1="550" x2="305" y2="585" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 4 -->
  <circle cx="55" cy="615" r="14" fill="#2e7d32"/>
  <text x="55" y="620" text-anchor="middle" font-size="14" font-weight="bold" fill="white">4</text>
  <rect x="80" y="590" width="450" height="65" fill="white" stroke="#2e7d32" stroke-width="1.5" rx="6"/>
  <text x="95" y="611" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">if (!response.ok) {</text>
  <text x="115" y="629" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">  throw new Error("HTTP error " + …);</text>
  <text x="95" y="647" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">}</text>

  <line x1="535" y1="618" x2="568" y2="618" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="575" y="608" font-size="12" fill="#2e7d32" font-weight="bold">Synchronous status check</text>
  <text x="575" y="624" font-size="12" fill="#333">A regular if-statement. On error, throw</text>
  <text x="575" y="640" font-size="12" fill="#333">jumps straight to the catch block (step 8).</text>

  <line x1="305" y1="655" x2="305" y2="690" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 5 -->
  <circle cx="55" cy="715" r="14" fill="#2e7d32"/>
  <text x="55" y="720" text-anchor="middle" font-size="14" font-weight="bold" fill="white">5</text>
  <rect x="80" y="695" width="450" height="40" fill="white" stroke="#2e7d32" stroke-width="1.5" rx="6"/>
  <text x="95" y="720" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">const text = await response.text();</text>

  <line x1="535" y1="715" x2="568" y2="715" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="575" y="710" font-size="12" fill="#2e7d32" font-weight="bold">Asks for the body as text</text>
  <text x="575" y="726" font-size="12" fill="#333">response.text() returns a Promise that</text>
  <text x="575" y="742" font-size="12" fill="#333">resolves once the body is fully decoded.</text>

  <!-- Pause banner 2 -->
  <rect x="100" y="755" width="800" height="35" fill="#ffeb3b" stroke="#f9a825" stroke-width="2" rx="6"/>
  <text x="500" y="779" text-anchor="middle" font-size="14" font-weight="bold" fill="#5d4037">⏸  await PAUSES fetchQuote again. Main thread is FREE while the body downloads/decodes.</text>

  <!-- ====== Idle 2 ====== -->
  <rect x="20" y="815" width="960" height="55" fill="#f3e5f5" rx="10" stroke="#ce93d8" stroke-width="1"/>
  <text x="500" y="838" text-anchor="middle" font-size="13" fill="#4a148c" font-weight="bold">Main thread is idle again</text>
  <text x="500" y="857" text-anchor="middle" font-size="12" fill="#6a1b9a" font-style="italic">Other tasks can run. fetchQuote is suspended, holding its local variables.</text>

  <!-- ====== PHASE 3 ====== -->
  <rect x="20" y="890" width="960" height="220" fill="#fff3e0" rx="10" stroke="#ffb74d" stroke-width="1"/>
  <text x="40" y="918" font-size="16" font-weight="bold" fill="#e65100">PHASE 3 — Resume after second await (when text is ready)</text>

  <!-- Step 6 -->
  <circle cx="55" cy="960" r="14" fill="#2e7d32"/>
  <text x="55" y="965" text-anchor="middle" font-size="14" font-weight="bold" fill="white">6</text>
  <rect x="80" y="940" width="450" height="40" fill="white" stroke="#2e7d32" stroke-width="1.5" rx="6"/>
  <text x="95" y="965" font-size="13" fill="#222" font-weight="bold">text Promise resolves → fetchQuote RESUMES</text>

  <line x1="535" y1="960" x2="568" y2="960" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="575" y="955" font-size="12" fill="#2e7d32" font-weight="bold">text is assigned</text>
  <text x="575" y="971" font-size="12" fill="#333">The decoded string is stored in text.</text>

  <line x1="305" y1="980" x2="305" y2="1015" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 7 -->
  <circle cx="55" cy="1050" r="14" fill="#2e7d32"/>
  <text x="55" y="1055" text-anchor="middle" font-size="14" font-weight="bold" fill="white">7</text>
  <rect x="80" y="1020" width="450" height="60" fill="white" stroke="#2e7d32" stroke-width="1.5" rx="6"/>
  <text x="95" y="1040" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">document.getElementById('quote')</text>
  <text x="115" y="1058" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">  .innerHTML = text;</text>
  <text x="95" y="1076" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">// fetchQuote returns; Promise resolves</text>

  <line x1="535" y1="1050" x2="568" y2="1050" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="575" y="1040" font-size="12" fill="#2e7d32" font-weight="bold">DOM updated; function exits</text>
  <text x="575" y="1056" font-size="12" fill="#333">The quote appears on the page. The Promise</text>
  <text x="575" y="1072" font-size="12" fill="#333">returned by fetchQuote() (back in step 1)</text>
  <text x="575" y="1088" font-size="12" fill="#333">resolves to undefined.</text>

  <!-- Error branch -->
  <line x1="305" y1="1080" x2="305" y2="1135" stroke="#c62828" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowRed)"/>
  <text x="320" y="1117" font-size="11" font-style="italic" fill="#c62828">…or, if anything in the try block threw or rejected:</text>

  <!-- Step 8: catch -->
  <circle cx="55" cy="1175" r="14" fill="#c62828"/>
  <text x="55" y="1180" text-anchor="middle" font-size="14" font-weight="bold" fill="white">8</text>
  <rect x="80" y="1140" width="450" height="80" fill="white" stroke="#c62828" stroke-width="1.5" rx="6"/>
  <text x="95" y="1161" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">} catch (error) {</text>
  <text x="115" y="1179" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">  console.log('An error occurred:',</text>
  <text x="135" y="1197" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">              error);</text>
  <text x="95" y="1215" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#222">}</text>

  <line x1="535" y1="1175" x2="568" y2="1175" stroke="#c62828" stroke-width="1.5"/>
  <text x="575" y="1160" font-size="12" fill="#c62828" font-weight="bold">try/catch handles the error</text>
  <text x="575" y="1176" font-size="12" fill="#333">A rejected awaited Promise behaves like a</text>
  <text x="575" y="1192" font-size="12" fill="#333">thrown exception — the same try/catch you</text>
  <text x="575" y="1208" font-size="12" fill="#333">already know catches it.</text>

  <!-- Footer -->
  <rect x="40" y="1250" width="920" height="100" fill="#fffde7" stroke="#fbc02d" stroke-width="1" rx="6"/>
  <text x="500" y="1273" text-anchor="middle" font-size="13" font-weight="bold" fill="#5d4037">Key idea: looks synchronous, behaves asynchronously</text>
  <text x="500" y="1293" text-anchor="middle" font-size="12" fill="#333">The total timing of network work is identical to the .then() versions — the request still happens in the</text>
  <text x="500" y="1309" text-anchor="middle" font-size="12" fill="#333">background and the main thread is never blocked. What changes is the source code: instead of nested</text>
  <text x="500" y="1325" text-anchor="middle" font-size="12" fill="#333">callbacks, the function pauses at each await and resumes when the Promise resolves, so the code reads</text>
  <text x="500" y="1341" text-anchor="middle" font-size="12" fill="#333">in normal top-to-bottom order and uses ordinary try/catch for errors.</text>
</svg>
