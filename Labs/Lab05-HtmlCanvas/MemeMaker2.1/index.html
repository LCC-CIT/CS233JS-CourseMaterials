<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meme Creator</title>
</head>

<body>

  <div class="container-fluid">
    <div class="row">

      <!-- Hidden image element used as the source for canvas drawing -->
      <img id="hiddenImage" src="" style="display:none" alt="Hidden image">

      <div class="col-md-8 d-flex align-items-center justify-content-center p-3">
        <canvas id="canvas">
          <!--- Show this message if <canvas> is not recognized -->
          Canvas not supported in your browser.
        </canvas>
      </div>

      <div class="col-md-4 d-flex flex-column align-items-center justify-content-center p-3">

        <div class="mb-3 w-75">
          <label for="image" class="form-label">Source Image:</label>
          <input type="file" id="image" class="form-control" accept=".png,.jpg,.jpeg">
        </div>

        <div class="mb-3 w-75">
          <label for="topText" class="form-label">Top Text:</label>
          <input type="text" id="topText" class="form-control" placeholder="Top text">
        </div>

        <div class="mb-3 w-75">
          <label for="bottomText" class="form-label">Bottom Text:</label>
          <input type="text" id="bottomText" class="form-control" placeholder="Bottom text">
        </div>

        <div class="mb-3 w-75">
          <label for="filterSelect" class="form-label">Choose a Filter:</label>
          <select id="filterSelect" class="form-select">
            <option value="none">None</option>
            <option value="grayscale">Grayscale</option>
            <option value="highpass">Highpass</option>
            <option value="saturation">Saturation</option>
            <option value="laplacian">Laplacian</option>
            <option value="mirror">Mirror</option>
            <option value="thresholding">Thresholding</option>
          </select>
        </div>

        <div class="mb-3 w-75">
          <label for="scaleRange" class="form-label">Image Size:</label>
          <input type="range" id="scaleRange" class="form-range" min="0.5" max="2" step="0.05" value="1">
        </div>

        <div class="mb-3 w-75">
          <label for="rotateRange" class="form-label">Rotation:</label>
          <input type="range" id="rotateRange" class="form-range" min="-180" max="180" step="1" value="0">
        </div>

        <div class="mb-3 w-75">
          <label for="bgColor" class="form-label">Background Color:</label>
          <input type="color" id="bgColor" class="form-control form-control-color w-100" value="#000000">
        </div>

        <a class="btn btn-primary mt-2" id="downloadMeme" href="#" download="meme.jpg">Download</a>

      </div>

    </div>
  </div>

  <script type="module" src="./src/js/main.js"></script>
</body>

</html>
