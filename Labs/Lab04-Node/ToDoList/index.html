<!-- Lab project completed by Brian Bird spring 2024 using starter files from Mari Good 
     Refactored the code into separate classes and modeles and to use Vite spring 2026 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To-Do-List</title>
</head>
<body>
  <!-- Static app header. JS does not modify this section. -->
  <div class="navbar navbar-expand-sm bg-dark">
    <div class="container-fluid">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link text-white" href="#">My ToDo List</a>
        </li>
      </ul>
    </div>
  </div>
  <div class="container">
    <div class="row content-area">
      <div class="col-sm-2"></div>
      <div class="col-sm-8">
        <h2>ToDo List</h2>

        <!-- JS reads this input value when creating a new task. -->
        <div class="row input-area">
          <div class="col-sm-1"></div>
          <div class="form-group col-sm-9">
            <input type="text" placeholder="New Task" class="form-control" id="addTask">
          </div>
          <div class="form-group col-sm-1">
            <!-- JS listens for clicks on this button to trigger add-task flow. -->
            <button id="addButton" class="btn btn-primary">Add</button>
          </div>
          <div class="col-sm-1"></div>
        </div>

        <!-- JS treats this list as the render target and replaces its innerHTML on updates. -->
        <ul class="list-group" id="taskList">
          <!-- Seed items are fallback/example markup; JS re-renders this list from model state. -->
          <li class="list-group-item checkbox">
            <div class="row">
              <div class="col-sm-1 pt-2 checkbox">
                <label><input name="toggleTaskStatus" type="checkbox" value="" class="" checked></label>
              </div>
              <div class="col-sm-10 task-text complete">
                First item
              </div>
              <div class="col-sm-1 pt-2 delete-icon-area">
                <a name="deleteTask" class="" href="/"><i class="bi-trash delete-icon"></i></a>
              </div>
            </div>
          </li>
          <li class="list-group-item checkbox">
            <div class="row">
              <div class="col-sm-1 pt-2 checkbox">
                <label><input name="toggleTaskStatus" type="checkbox" value="" class=""></label>
              </div>
              <div class="col-sm-10 task-text">
                Second item
              </div>
              <div class="col-sm-1 pt-2 delete-icon-area">
                <a name="deleteTask" class="" href="/"><i class="bi-trash delete-icon"></i></a>
              </div>
            </div>
          </li>
          <li class="list-group-item checkbox">
            <div class="row">
              <div class="col-sm-1 pt-2 checkbox">
                <label><input name="toggleTaskStatus" type="checkbox" value="" class=""></label>
              </div>
              <div class="col-sm-10 task-text">
                Third item
              </div>
              <div class="col-sm-1 pt-2 delete-icon-area">
                <a name="deleteTask" class="" href="/"><i class="bi-trash delete-icon"></i></a>
              </div>
            </div>
          </li>
        </ul>
      </div>

      <div class="col-sm-2"></div>
    </div>

  </div><!-- /.container -->

  <!-- Keep one module entry so Vite owns dependency graphing, bundling, and cache busting. -->
  <script type="module" src="/src/js/index.js"></script>
</body>
</html>
