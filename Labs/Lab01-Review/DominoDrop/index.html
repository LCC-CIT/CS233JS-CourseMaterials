<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CS 233JS Domino Drop</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="game-shell">
        <div class="game-board" id="board">
            <div class="game-status" id="status">Lives: 3 Removed: 0/20</div>

            <div class="target-row">
                <span class="target-label">Target</span>
                <div class="target-domino" id="target-domino"></div>
            </div>

            <div class="domino-row">
                <div id="0" name="domino" class="domino-card"></div>
                <div id="1" name="domino" class="domino-card"></div>
                <div id="2" name="domino" class="domino-card"></div>
                <div id="3" name="domino" class="domino-card"></div>
                <div id="4" name="domino" class="domino-card"></div>
            </div>

            <div class="domino-row">
                <div id="5" name="domino" class="domino-card"></div>
                <div id="6" name="domino" class="domino-card"></div>
                <div id="7" name="domino" class="domino-card"></div>
                <div id="8" name="domino" class="domino-card"></div>
                <div id="9" name="domino" class="domino-card"></div>
            </div>

            <div class="domino-row">
                <div id="10" name="domino" class="domino-card"></div>
                <div id="11" name="domino" class="domino-card"></div>
                <div id="12" name="domino" class="domino-card"></div>
                <div id="13" name="domino" class="domino-card"></div>
                <div id="14" name="domino" class="domino-card"></div>
            </div>

            <div class="domino-row">
                <div id="15" name="domino" class="domino-card"></div>
                <div id="16" name="domino" class="domino-card"></div>
                <div id="17" name="domino" class="domino-card"></div>
                <div id="18" name="domino" class="domino-card"></div>
                <div id="19" name="domino" class="domino-card"></div>
            </div>
        </div>
    </div>

    <script src="src/index.js"></script>
</body>

</html>
