<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CS 233JS Double Trouble</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Outer page container used for centering and spacing -->
    <div class="game-shell">

        <!-- Main game board container -->
        <div class="game-board" id="board">
            <!-- Live score text updated by JavaScript -->
            <div class="game-status" id="status">Cleared: 0 &nbsp; Turns: 0</div>

            <!-- Row 1 of dominoes -->
            <div class="domino-row">
                <div id="0" class="game-domino"></div>
                <div id="1" class="game-domino"></div>
                <div id="2" class="game-domino"></div>
                <div id="3" class="game-domino"></div>
                <div id="4" class="game-domino"></div>
            </div>

            <!-- Row 2 of dominoes -->
            <div class="domino-row">
                <div id="5" class="game-domino"></div>
                <div id="6" class="game-domino"></div>
                <div id="7" class="game-domino"></div>
                <div id="8" class="game-domino"></div>
                <div id="9" class="game-domino"></div>
            </div>

            <!-- Row 3 of dominoes -->
            <div class="domino-row">
                <div id="10" class="game-domino"></div>
                <div id="11" class="game-domino"></div>
                <div id="12" class="game-domino"></div>
                <div id="13" class="game-domino"></div>
                <div id="14" class="game-domino"></div>
            </div>
        </div>
    </div>

    <!-- Game behavior logic -->
    <script src="src/index.js"></script>
</body>

</html>
